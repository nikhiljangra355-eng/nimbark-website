<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard — Nimbark Research Insights</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Merriweather:wght@700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body class="admin-page">

  <div class="topbar">
    <div class="container topbar-inner">
      <div class="topbar-left">
        <a href="/" class="topbar-item">← Back to website</a>
      </div>
      <div class="topbar-right">
        <button type="button" id="logoutBtn" class="topbar-item" style="background:none;border:0;cursor:pointer;display:none;">Log out</button>
      </div>
    </div>
  </div>

  <!-- Login view -->
  <div class="container" id="loginView">
    <div class="admin-login">
      <img src="/assets/logo.svg" alt="Nimbark Research Insights logo" width="64" height="64" style="margin: 0 auto 1rem;" />
      <h1>Admin Dashboard</h1>
      <p>Enter your admin access token to view enquiries.</p>
      <div class="form-feedback" id="loginError" role="alert"></div>
      <form id="loginForm">
        <div class="form-group" style="text-align:left;">
          <label for="token">Access Token</label>
          <input type="password" id="token" autocomplete="current-password" placeholder="Admin token" required
                 style="width:100%;font-family:inherit;font-size:0.95rem;padding:0.75rem 0.95rem;border:1.5px solid var(--line);border-radius:10px;background:var(--cream);" />
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="loginBtn">Log In</button>
      </form>
    </div>
  </div>

  <!-- Dashboard view -->
  <div class="container admin-shell" id="dashView" style="display:none;">
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:0.8rem;margin-bottom:1.4rem;">
      <h1 style="font-family:var(--font-display);color:var(--green-900);font-size:1.5rem;">Enquiries</h1>
      <div style="display:flex;gap:0.6rem;align-items:center;">
        <span id="countBadge" class="badge new" style="font-size:0.78rem;"></span>
        <button type="button" class="btn btn-outline" id="refreshBtn" style="padding:0.5rem 1.1rem;font-size:0.85rem;">↻ Refresh</button>
      </div>
    </div>

    <div class="admin-toolbar">
      <input type="search" id="searchInput" placeholder="Search name, phone, email or message…" />
      <select id="serviceFilter">
        <option value="">All services</option>
        <option>PhD Thesis Assistance</option>
        <option>Synopsis &amp; Research Paper Writing</option>
        <option>Data Analysis &amp; Interpretation</option>
        <option>Journal Publication Support</option>
        <option>Plagiarism Removal &amp; Plagiarism Report</option>
        <option>Academic Editing &amp; Proofreading</option>
        <option>Book Publishing</option>
        <option>Patent &amp; Copyright Assistance</option>
        <option>Project &amp; Internship Reports</option>
        <option>Other</option>
      </select>
      <select id="statusFilter">
        <option value="">All statuses</option>
        <option value="new">New</option>
        <option value="contacted">Contacted</option>
        <option value="closed">Closed</option>
      </select>
    </div>

    <div class="form-feedback" id="dashError" role="alert"></div>

    <div class="admin-table-wrap">
      <table class="admin-table">
        <thead>
          <tr>
            <th>Date</th><th>Name</th><th>Phone</th><th>Email</th>
            <th>Service</th><th>Message</th><th>Status</th><th>Actions</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr><td colspan="8" style="text-align:center;color:var(--muted);padding:2rem;">Loading…</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <script>
  (function () {
    'use strict';
    var TOKEN_KEY = 'nimbark_admin_token';
    var enquiries = [];

    var loginView = document.getElementById('loginView');
    var dashView = document.getElementById('dashView');
    var loginError = document.getElementById('loginError');
    var dashError = document.getElementById('dashError');
    var tableBody = document.getElementById('tableBody');
    var logoutBtn = document.getElementById('logoutBtn');

    function token() { return sessionStorage.getItem(TOKEN_KEY) || ''; }

    function showLogin() {
      loginView.style.display = '';
      dashView.style.display = 'none';
      logoutBtn.style.display = 'none';
    }
    function showDash() {
      loginView.style.display = 'none';
      dashView.style.display = '';
      logoutBtn.style.display = '';
    }

    function esc(str) {
      var div = document.createElement('div');
      div.textContent = str == null ? '' : String(str);
      return div.innerHTML;
    }

    function fmtDate(iso) {
      try {
        return new Date(iso).toLocaleString('en-IN', {
          day: '2-digit', month: 'short', year: 'numeric',
          hour: '2-digit', minute: '2-digit', timeZone: 'Asia/Kolkata'
        });
      } catch (e) { return iso || ''; }
    }

    function render() {
      var q = document.getElementById('searchInput').value.trim().toLowerCase();
      var service = document.getElementById('serviceFilter').value;
      var status = document.getElementById('statusFilter').value;

      var rows = enquiries.filter(function (e) {
        if (service && (e.service || '') !== service) return false;
        if (status && (e.status || 'new') !== status) return false;
        if (q) {
          var hay = [e.name, e.phone, e.email, e.message, e.service].join(' ').toLowerCase();
          if (hay.indexOf(q) === -1) return false;
        }
        return true;
      });

      document.getElementById('countBadge').textContent =
        rows.length + ' of ' + enquiries.length + ' enquiries';

      if (!rows.length) {
        tableBody.innerHTML = '<tr><td colspan="8" style="text-align:center;color:var(--muted);padding:2rem;">No enquiries match.</td></tr>';
        return;
      }

      tableBody.innerHTML = rows.map(function (e) {
        var st = e.status || 'new';
        return '<tr data-id="' + esc(e.id) + '">' +
          '<td style="white-space:nowrap;">' + fmtDate(e.created_at) + '</td>' +
          '<td><strong>' + esc(e.name) + '</strong></td>' +
          '<td style="white-space:nowrap;">' + esc(e.phone) + '</td>' +
          '<td>' + esc(e.email) + '</td>' +
          '<td>' + esc(e.service || '—') + '</td>' +
          '<td class="msg">' + esc(e.message || '—') + '</td>' +
          '<td><span class="badge ' + esc(st) + '">' + esc(st) + '</span><br/>' +
            '<select class="status-select" style="margin-top:0.4rem;">' +
              ['new', 'contacted', 'closed'].map(function (s) {
                return '<option value="' + s + '"' + (s === st ? ' selected' : '') + '>' + s + '</option>';
              }).join('') +
            '</select></td>' +
          '<td><div class="row-actions">' +
            '<a class="icon-btn" href="tel:+91' + esc(e.phone) + '" title="Call">' +
              '<svg viewBox="0 0 24 24"><path d="M6.6 10.8a15.9 15.9 0 0 0 6.6 6.6l2.2-2.2a1 1 0 0 1 1-.25 11.4 11.4 0 0 0 3.6.58 1 1 0 0 1 1 1V20a1 1 0 0 1-1 1A17 17 0 0 1 3 4a1 1 0 0 1 1-1h3.5a1 1 0 0 1 1 1 11.4 11.4 0 0 0 .57 3.6 1 1 0 0 1-.25 1z"/></svg></a>' +
            '<a class="icon-btn" href="https://wa.me/91' + esc(e.phone) + '" target="_blank" rel="noopener" title="WhatsApp">' +
              '<svg viewBox="0 0 24 24"><path d="M17.5 14.4c-.3-.15-1.76-.87-2.03-.97-.27-.1-.47-.15-.67.15-.2.3-.77.96-.94 1.16-.17.2-.35.22-.65.07a8.2 8.2 0 0 1-2.4-1.48 9 9 0 0 1-1.66-2.07c-.17-.3-.02-.46.13-.61.14-.13.3-.35.45-.52.15-.17.2-.3.3-.5.1-.2.05-.37-.02-.52-.08-.15-.67-1.62-.92-2.22-.24-.58-.49-.5-.67-.51h-.57c-.2 0-.52.07-.8.37-.27.3-1.04 1.02-1.04 2.5 0 1.47 1.07 2.9 1.22 3.1.15.2 2.1 3.2 5.1 4.49.71.3 1.27.49 1.7.63.72.23 1.37.2 1.88.12.58-.09 1.76-.72 2-1.42.25-.7.25-1.3.18-1.42-.07-.12-.27-.2-.57-.35zM12.05 21.8h-.01a9.87 9.87 0 0 1-5.03-1.38l-.36-.21-3.74.98 1-3.65-.24-.37a9.86 9.86 0 1 1 8.38 4.63zM12.05 2A11.86 11.86 0 0 0 1.8 19.8L.1 24l4.3-1.13A11.85 11.85 0 1 0 12.05 2z"/></svg></a>' +
            '<a class="icon-btn" href="mailto:' + esc(e.email) + '" title="Email">' +
              '<svg viewBox="0 0 24 24"><path d="M20 4H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2zm0 4-8 5-8-5V6l8 5 8-5z"/></svg></a>' +
          '</div></td>' +
        '</tr>';
      }).join('');
    }

    function load() {
      dashError.className = 'form-feedback';
      tableBody.innerHTML = '<tr><td colspan="8" style="text-align:center;color:var(--muted);padding:2rem;">Loading…</td></tr>';
      fetch('/api/enquiries', { headers: { Authorization: 'Bearer ' + token() } })
        .then(function (res) {
          if (res.status === 401) {
            sessionStorage.removeItem(TOKEN_KEY);
            showLogin();
            loginError.className = 'form-feedback error';
            loginError.textContent = 'Session expired or invalid token. Please log in again.';
            throw new Error('unauthorized');
          }
          return res.json();
        })
        .then(function (data) {
          if (!data.success) throw new Error(data.error || 'Failed to load');
          enquiries = data.enquiries || [];
          render();
        })
        .catch(function (err) {
          if (err.message === 'unauthorized') return;
          dashError.className = 'form-feedback error';
          dashError.textContent = 'Could not load enquiries: ' + err.message;
          tableBody.innerHTML = '<tr><td colspan="8" style="text-align:center;color:var(--muted);padding:2rem;">—</td></tr>';
        });
    }

    // Login: verify the token by attempting a fetch
    document.getElementById('loginForm').addEventListener('submit', function (e) {
      e.preventDefault();
      var value = document.getElementById('token').value.trim();
      var btn = document.getElementById('loginBtn');
      loginError.className = 'form-feedback';
      btn.disabled = true;
      btn.textContent = 'Checking…';
      fetch('/api/enquiries', { headers: { Authorization: 'Bearer ' + value } })
        .then(function (res) {
          if (res.status === 401) throw new Error('Invalid token. Please check and try again.');
          if (!res.ok) throw new Error('Server error (' + res.status + '). Check deployment configuration.');
          return res.json();
        })
        .then(function (data) {
          sessionStorage.setItem(TOKEN_KEY, value);
          enquiries = data.enquiries || [];
          showDash();
          render();
        })
        .catch(function (err) {
          loginError.className = 'form-feedback error';
          loginError.textContent = err.message;
        })
        .finally(function () {
          btn.disabled = false;
          btn.textContent = 'Log In';
        });
    });

    // Status updates
    tableBody.addEventListener('change', function (e) {
      var select = e.target.closest('.status-select');
      if (!select) return;
      var row = select.closest('tr');
      var id = row.getAttribute('data-id');
      select.disabled = true;
      fetch('/api/enquiries/' + encodeURIComponent(id), {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token() },
        body: JSON.stringify({ status: select.value })
      })
        .then(function (res) { return res.json(); })
        .then(function (data) {
          if (!data.success) throw new Error(data.error || 'Update failed');
          var item = enquiries.find(function (q) { return String(q.id) === String(id); });
          if (item) item.status = select.value;
          render();
        })
        .catch(function (err) {
          dashError.className = 'form-feedback error';
          dashError.textContent = 'Status update failed: ' + err.message;
          select.disabled = false;
        });
    });

    document.getElementById('searchInput').addEventListener('input', render);
    document.getElementById('serviceFilter').addEventListener('change', render);
    document.getElementById('statusFilter').addEventListener('change', render);
    document.getElementById('refreshBtn').addEventListener('click', load);
    logoutBtn.addEventListener('click', function () {
      sessionStorage.removeItem(TOKEN_KEY);
      enquiries = [];
      document.getElementById('token').value = '';
      showLogin();
    });

    // Boot
    if (token()) { showDash(); load(); } else { showLogin(); }
  })();
  </script>
</body>
</html>
