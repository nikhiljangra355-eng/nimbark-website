    <path d="M381 61 l-10 -10"/><path d="M451 61 l10 -10"/><path d="M381 131 l-10 10"/><path d="M451 131 l10 10"/>
  </g>
</g>

<!-- ground -->
<ellipse cx="258" cy="392" rx="150" ry="18" fill="#e8830c" opacity="0.5"/>

<!-- tree trunk and branches -->
