<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 440" fill="none">
<defs>
  <linearGradient id="blob" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#f7c948"/>
    <stop offset="1" stop-color="#f5921e"/>
  </linearGradient>
  <linearGradient id="trunkg" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#8a5527"/>
    <stop offset="1" stop-color="#6e421d"/>
  </linearGradient>
</defs>

<!-- background blob -->
<ellipse cx="265" cy="235" rx="215" ry="185" fill="url(#blob)"/>

<!-- sun -->
